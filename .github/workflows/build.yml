name: cgui

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the build (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose
      - name: Clippy lint
        run: cargo clippy

  release:
    needs: ci
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Set version env
        run: echo "APP_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      - name: Clippy lint
        run: cargo clippy
      - name: Run tests
        run: cargo test --verbose

      - name: Build release binary (macOS)
        run: cargo build --release --verbose
      
      - name: Get project name from Cargo.toml
        id: cargo_meta
        run: |
          BIN_NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')
          echo "BIN_NAME=${BIN_NAME}" >> $GITHUB_ENV

      - name: Package artifact
        run: |
          ARCHIVE_NAME="${BIN_NAME}-${APP_VERSION}-macos.tar.gz"
          cd target/release
          tar czf "../../${ARCHIVE_NAME}" "${BIN_NAME}"
          echo "ASSET=${ARCHIVE_NAME}" >> $GITHUB_ENV

      - name: Create Git tag
        run: |
          git tag v${{ env.APP_VERSION }}
          git push origin v${{ env.APP_VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: v${{ env.APP_VERSION }}
          files: ${{ env.ASSET }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}